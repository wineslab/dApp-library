<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Real-Time Plots</title>
    <script src="https://cdn.plot.ly/plotly-3.0.1.min.js" charset="utf-8"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>

<body>
    <div id="prbs"></div>
    <div id="magnitude"></div>
    <div style="display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 24px;">
        <div id="predicted_label"></div>
        <div id="ground_truth_label"></div>
        <div id="sampling_threshold_control"></div>
    </div>
    <div id="adaptive_noise_floor"></div>

    <script>
        var waterfall = [{
            z: [],
            type: 'heatmap',
            colorscale: "Viridis",
            zmin: 0,
            zmax: 100,
            colorbar: {
                title:{ 
                    text: "Magnitude [dB]",
                    side: 'right'
                },
                orientation: 'v'
            }
        }];

        var waterfallLayout = {
            title: {
                text: "dApp Sensed Spectrum",
                font: { size: 16 }
            },
            xaxis: {
                title: {
                    text: "OFDM Symbol Subcarriers",
                    font: { size: 14 }
                }
            },
            yaxis: {
                title: {
                    text: "Time samples",
                    font: { size: 14 }
                },
                autorange: 'reversed'
            },
            annotations: [
                {
                    x: 0, // Will be updated dynamically
                    y: 1.15,
                    xref: 'x',
                    yref: 'paper',
                    text: 'Frequency in GHz',
                    showarrow: false,
                    font: {
                        size: 12
                    }
                },  
                {
                    x: 0, // Will be updated dynamically
                    y: 1.1,
                    xref: 'x',
                    yref: 'paper',
                    text: `0.0000`,
                    showarrow: false,
                    font: {
                        size: 12
                    }
                },                {
                    x: 0, // Will be updated dynamically
                    y: 1.1,
                    xref: 'x',
                    yref: 'paper',
                    text: `0.0000`,
                    showarrow: false,
                    font: {
                        size: 12
                    }
                },

                {
                    x: 0, // Will be updated dynamically
                    y: 1.1,
                    xref: 'x',
                    yref: 'paper',
                    text: `0.0000`,
                    showarrow: false,
                    font: {
                        size: 12
                    }
                },
                {
                    x: 0, // Will be updated dynamically
                    y: 1.1,
                    xref: 'x',
                    yref: 'paper',
                    text: `0.0000`,
                    showarrow: false,
                    font: {
                        size: 12
                    }
                },
                {
                    x: 0, // Will be updated dynamically
                    y: 1.1,
                    xref: 'x',
                    yref: 'paper',
                    text: `0.0000`,
                    showarrow: false,
                    font: {
                        size: 12
                    }
                }
            ]
        };

        var prbs = [{
            type: 'heatmap',
            colorscale: [[0, 'green'], [1, 'red']],
            zmin: 0,
            zmax: 1,
            showscale: false
        }];

        var prbsLayout = {
            annotations: [
            //     {
            //     x: 0,
            //     y: 1.05,
            //     xref: 'paper',
            //     yref: 'paper',
            //     xanchor: 'left',
            //     yanchor: 'bottom',
            //     text: 'The first 76 PRB usually have channels that should not be nulled (OAI constraint)',
            //     showarrow: false,
            //     font: {
            //         size: 12
            //     },
            //     align: 'left'
            // },
            {
                x: 1,
                y: 1.05,
                xref: 'paper',
                yref: 'paper',
                xanchor: 'right',
                yanchor: 'bottom',
                text: '<span style="color: green; font-weight: bold;">Green</span> = Usable, <span style="color: red; font-weight: bold;">Red</span> = Blocked',
                showarrow: false,
                font: {
                    size: 12
                },
                align: 'right'
            }
        ],
            title: {
                text: "dApp PRB Status Grid",
                font: { size: 16 }
            },
            xaxis: {
                title: {
                    text: "PRB Index",
                    font: { size: 14 }
                }
            },
            yaxis: {
                title: {
                    text: "Status",
                    font: { size: 14 }
                },
                showticklabels: false
            },
            height: 200,
            margin: {
                l: 95,
                r: 105
            }
        };

        var classifierLayout = {
            title: {
                text: "RFI Predicted: N/A",
                font: { size: 24 }
            },
            xaxis: { visible: false },
            yaxis: { visible: false }
        };

        var adaptiveNoiseFloorData = [{
            x: [],
            y: [],
            mode: 'lines',
            type: 'scattergl'
        }];

        var adaptiveNoiseFloorLayout = {
            title: {
                text: "Adaptive Noise Floor",
                font: {size: 16}
            },
            xaxis: {
                title: {
                    text: "FFT Bin"
                }
                // range set dynamically from ofdm_symbol_size on initialize_plot
            },
            yaxis: {
                title: {
                    text: "Noise Floor"
                },
                autorange: "max",
                rangemode: "tozero"
            }
        };

        var waterfall_buffer;
        var prbs_buffer;
        var predictedLabel;
        var start_ignore;
        var end_ignore;
        var initialized = false;
        var samplingThresholdInput;
        var gtInput = null;
        var gtBadge = null;
        function updateBadge(label) { if (gtBadge) gtBadge.textContent = label; }
        function flashBadge() {
            if (!gtBadge) return;
            gtBadge.style.outline = '3px solid #fbbc04';
            setTimeout(function() { gtBadge.style.outline = 'none'; }, 400);
        }

        var socket = io.connect('http://' + document.domain + ':' + location.port);
        socket.on('initialize_plot', function (data) {
            var ofdm_symbol_size = data.magnitude[0].length;
            var first_carrier_offset = data.first_carrier_offset;
            var freq_step = data.bw / ofdm_symbol_size;
            var start_freq = data.center_freq - (ofdm_symbol_size / 2) * freq_step;
            var freq_labels = [];
            for (let i = 0; i < 5; i++) {
                let pos = Math.floor(i * ofdm_symbol_size / 4);
                let f = (start_freq + pos * freq_step) / 1e9;
                freq_labels.push(f.toFixed(4));
            }

            // Update x values for annotations (frequency markers) with proper edge margins
            var left_margin = Math.max(25, ofdm_symbol_size * 0.02); // At least 25 or 2% of width
            var right_margin = Math.max(65, ofdm_symbol_size * 0.02); // At least 65 or 2% of width
            
            waterfallLayout.annotations[0].x = ofdm_symbol_size / 2 + ofdm_symbol_size / 50; // slightly centered to the right
            waterfallLayout.annotations[1].x = left_margin;
            waterfallLayout.annotations[2].x = ofdm_symbol_size / 4;
            waterfallLayout.annotations[3].x = ofdm_symbol_size / 2;
            waterfallLayout.annotations[4].x = ofdm_symbol_size * 3 / 4;
            waterfallLayout.annotations[5].x = ofdm_symbol_size - right_margin;
            waterfallLayout.annotations[1].text = `${freq_labels[0]}`;
            waterfallLayout.annotations[2].text = `${freq_labels[1]}`;
            waterfallLayout.annotations[3].text = `${freq_labels[2]}`;
            waterfallLayout.annotations[4].text = `${freq_labels[3]}`;
            waterfallLayout.annotations[5].text = `${freq_labels[4]}`;

            waterfall_buffer = data.magnitude;
            waterfall[0].z = waterfall_buffer;
            prbs_buffer = [new Array(data.num_prbs).fill(0)];
            prbs[0].z = prbs_buffer;
            Plotly.newPlot('magnitude', waterfall, waterfallLayout);
            Plotly.newPlot('prbs', prbs, prbsLayout);

            if (data.show_controls) {
            var samplingThresholdContainer = document.getElementById('sampling_threshold_control');
            samplingThresholdContainer.innerHTML = '';
            samplingThresholdContainer.style.cssText = 'padding: 12px; font-family: sans-serif; display: flex; align-items: center; gap: 10px;';

            var samplingThresholdLabel = document.createElement('label');
            samplingThresholdLabel.textContent = 'Visualization sampling threshold:';
            samplingThresholdLabel.style.cssText = 'font-size: 14px; font-weight: bold; white-space: nowrap;';
            samplingThresholdContainer.appendChild(samplingThresholdLabel);

            samplingThresholdInput = document.createElement('input');
            samplingThresholdInput.type = 'number';
            samplingThresholdInput.min = '1';
            samplingThresholdInput.step = '1';
            samplingThresholdInput.value = data.sampling_threshold;
            samplingThresholdInput.style.cssText = 'font-size: 13px; padding: 5px 10px; border: 2px solid #ccc; border-radius: 4px; width: 100px; outline: none;';
            samplingThresholdContainer.appendChild(samplingThresholdInput);

            var samplingThresholdBtn = document.createElement('button');
            samplingThresholdBtn.textContent = 'Set';
            samplingThresholdBtn.style.cssText = 'padding: 5px 14px; font-size: 13px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; cursor: pointer;';
            samplingThresholdContainer.appendChild(samplingThresholdBtn);

            function emitSamplingThreshold() {
                var val = parseInt(samplingThresholdInput.value, 10);
                if (!isNaN(val) && val >= 1) {
                    socket.emit('set_sampling_threshold', val);
                }
            }
            samplingThresholdBtn.addEventListener('click', emitSamplingThreshold);
            samplingThresholdInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') emitSamplingThreshold();
            });
            } // end show_controls

            // PRB zone overlays — only drawn when control is active (PRB blocking enabled).
            // Without control there are no blocked PRBs so zone markers would be misleading.
            if (data.show_prb_zones) {
                var prb_protected_below = data.prb_protected_below;
                var num_prbs = data.num_prbs;
                Plotly.relayout('prbs', {
                    shapes: [
                        // Protected zone: PRBs 0..prb_protected_below-1 (BWP/PRACH, never blacklisted)
                        {
                            type: 'rect',
                            x0: -0.5, x1: prb_protected_below - 0.5,
                            y0: -0.5, y1: 0.5,
                            fillcolor: 'rgba(180,180,180,0.45)',
                            line: { width: 1, color: '#999' }
                        },
                        // Guard band boundary: dashed line after the last eligible PRB
                        {
                            type: 'line',
                            x0: num_prbs - 0.5, x1: num_prbs - 0.5,
                            y0: -0.5, y1: 0.5,
                            line: { width: 2, color: '#666', dash: 'dash' }
                        }
                    ],
                    annotations: prbsLayout.annotations.concat([
                        {
                            x: prb_protected_below / 2, y: 1.15,
                            xref: 'x', yref: 'paper',
                            text: 'BWP/PRACH protected',
                            showarrow: false,
                            font: { size: 10, color: '#666' }
                        },
                        {
                            x: (prb_protected_below + num_prbs) / 2, y: 1.15,
                            xref: 'x', yref: 'paper',
                            text: 'Spectrum sharing eligible',
                            showarrow: false,
                            font: { size: 10, color: '#333' }
                        }
                    ])
                });
            }

            if(data.predicted_label){
                Plotly.newPlot("predicted_label", [], classifierLayout);
            }

            if(data.adaptive_noise_floor)
            {
                Plotly.newPlot("adaptive_noise_floor", adaptiveNoiseFloorData, adaptiveNoiseFloorLayout);
                Plotly.relayout("adaptive_noise_floor", {
                    'xaxis.range': [0, ofdm_symbol_size - 1]
                });
            }

            if (data.show_label_selector) {
                var container = document.getElementById('ground_truth_label');
                container.innerHTML = '';
                container.style.cssText = 'padding: 12px; font-family: sans-serif; display: flex; align-items: center; gap: 10px; flex-wrap: wrap;';

                var heading = document.createElement('span');
                heading.textContent = 'Ground Truth Label:';
                heading.style.cssText = 'font-size: 14px; font-weight: bold; white-space: nowrap;';
                container.appendChild(heading);

                // Status badge
                gtBadge = document.createElement('span');
                gtBadge.style.cssText = 'font-size: 13px; font-weight: bold; padding: 4px 14px; border-radius: 12px; white-space: nowrap; transition: outline 0.1s; background: #5f6368; color: #fff;';
                updateBadge(data.current_label);
                container.appendChild(gtBadge);

                // Free-text input for custom labels
                gtInput = document.createElement('input');
                gtInput.type = 'text';
                gtInput.value = data.current_label;
                gtInput.placeholder = 'custom label...';
                gtInput.style.cssText = 'font-size: 13px; padding: 5px 10px; border: 2px solid #ccc; border-radius: 4px; width: 160px; outline: none;';
                container.appendChild(gtInput);

                var btn = document.createElement('button');
                btn.textContent = 'Set';
                btn.style.cssText = 'padding: 5px 14px; font-size: 13px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; cursor: pointer;';
                container.appendChild(btn);

                var labelInitialized = false;
                function emitLabel() {
                    var val = gtInput.value.trim();
                    if (val) {
                        socket.emit('set_ground_truth_label', val);
                        updateBadge(val);
                        if (labelInitialized) flashBadge();
                        labelInitialized = true;
                    }
                }

                btn.addEventListener('click', emitLabel);
                gtInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') emitLabel();
                });

                emitLabel();
            }

            // Dynamic preprocessing based on first_carrier_offset    
            // The carrier frequency is in the middle PRB (including DC leak on some radios)
            console.log("Initial values:", {
                ofdm_symbol_size: ofdm_symbol_size,
                first_carrier_offset: first_carrier_offset,
                num_prbs: data.num_prbs
            });
            const num_consecutive_subcarriers_for_prb = 12; // Always 12 by LTE / NR standard
            // Calculate the middle PRB position
            var middle_prb_offset = data.num_prbs * num_consecutive_subcarriers_for_prb / 2;
            console.log("Calculated middle_prb_offset:", middle_prb_offset);
            
            // Calculate slice points dynamically
            // We want to show the spectrum centered around the middle PRB
            // The interval to consider is from the middle prb offset to the first carrier offset
            start_ignore = middle_prb_offset;
            end_ignore = first_carrier_offset;

            console.log("Slice points:", {
                start_ignore: start_ignore,
                end_ignore: end_ignore
            });

            initialized = true;
        });

        socket.on('update_sampling_threshold', function (rate) {
            samplingThresholdInput.value = rate;
        });

        socket.on('update_ground_truth_label', function (label) {
            if (gtInput) gtInput.value = label;
            updateBadge(label);
            flashBadge();
        });

        socket.on('reset_waterfall', function () {
            if (!initialized) return;
            var rows = waterfall_buffer.length;
            var cols = waterfall_buffer[0].length;
            for (var i = 0; i < rows; i++) {
                waterfall_buffer[i] = new Array(cols).fill(0);
            }
            Plotly.restyle('magnitude', { z: [waterfall_buffer] });
        });

        socket.on('update_plot', function (data) {
            if (!initialized) {
                return;
            }

            if ('magnitude' in data) {
                // console.log("Magnitude is: ", data.magnitude)

                var magnitude_length = data.magnitude.length;                
                // Dynamic slicing based on calculated positions
                let part1 = data.magnitude.slice(0, start_ignore);
                // Ignore the middle section (guards symbols)
                let part3 = data.magnitude.slice(end_ignore);
                let magnitudeToShow = part3.concat(part1).reverse();
                
                // console.log("Parts lengths:", {
                //     // part1_length: part1.length,
                //     // part3_length: part3.length,
                //     magnitudeToShow_length: magnitudeToShow.length
                // });
                
                // Update waterfall plot
                waterfall_buffer.pop();
                waterfall_buffer.unshift(magnitudeToShow);
                Plotly.restyle('magnitude', { z: [waterfall_buffer] });
            } else if ('prb_list' in data) {
                // console.log("PRBs are: ", data.prb_list);
                // We get a list of indexes to replace each time
                prbs_buffer[0].fill(0);
                data.prb_list.forEach(index => prbs_buffer[0][index] = 1);
                Plotly.restyle('prbs', { z: [prbs_buffer] });
            } else if ('predicted_label' in data) {
                // console.log("RFI Predicted is ", data.predicted_label);
                Plotly.relayout('predicted_label', {
                    'title.text': `RFI Predicted: ${data.predicted_label}`
                });
            } else if ('adaptive_noise_floor' in data) {
                var anf = data.adaptive_noise_floor;
                // console.log("ANF is: ", anf);
                var bins = anf.map((_, i) => i);
                Plotly.restyle('adaptive_noise_floor', { x: [bins], y: [anf] });
            } else {
                console.error('Error unknown values in data ', data);
            }
        });

    </script>
</body>

</html>
